<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "Inter Tight", system-ui, sans-serif; color: #F2F1EC; }
    #root { position: fixed; inset: 0; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- The runtime: Stage / Sprite / TimelineContext / Easing / interpolate / animate / TextSprite / ImageSprite / RectSprite -->
  <script type="text/babel" data-presets="react" src="animations.jsx"></script>

  <!-- Your scenes: define a <VideoScene /> (or any component) that uses <Sprite>, useTime(), Easing, etc. -->
  <script type="text/babel" data-presets="react" src="scenes.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Mount. Adjust width/height/duration to match the composition you wrote.
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <Stage width={1080} height={1080} duration={15} background="#0B0D10">
        <VideoScene />
      </Stage>
    );
  </script>
</body>
</html>
