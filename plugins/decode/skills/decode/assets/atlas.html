<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap');
:root{color-scheme:light;--page-bg:#f4f4f1;--text-primary:#1f1f1f;--text-secondary:#6f6f6a;--surface-1:#fff;--surface-2:#f2f2ef;--border:#dcdcd6;--border-strong:#b8b8b0;--bg-accent:#e8effc;--bg-warning:#faf0d9;--ca:#0f9d58;--cb:#3f8ac9;--cc:#c98a1a;--cd:#d96666;--font-mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
:root[data-theme="dark"]{color-scheme:dark;--page-bg:#1b1b19;--text-primary:#ececea;--text-secondary:#a2a29b;--surface-1:#242422;--surface-2:#2d2d2a;--border:#3a3a36;--border-strong:#55554f;--bg-accent:#20304a;--bg-warning:#3a3020;--cc:#e0a52e}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]){color-scheme:dark;--page-bg:#1b1b19;--text-primary:#ececea;--text-secondary:#a2a29b;--surface-1:#242422;--surface-2:#2d2d2a;--border:#3a3a36;--border-strong:#55554f;--bg-accent:#20304a;--bg-warning:#3a3020;--cc:#e0a52e}}
*{box-sizing:border-box}
body{margin:0;background:var(--page-bg);color:var(--text-primary);font-family:Vazirmatn,Tahoma,sans-serif;font-size:14.5px;line-height:2;text-align:right}
.wrap{max-width:1080px;margin:0 auto;padding:30px 20px 70px}
h1{font-size:1.45rem;font-weight:800;margin:0}
.sub{color:var(--text-secondary);margin-top:3px;font-size:.94em}
.layout{display:flex;gap:22px;margin-top:22px;align-items:flex-start}
main{flex:1;min-width:0}
code{font-family:var(--font-mono);direction:ltr;unicode-bidi:isolate;background:var(--surface-2);border:.5px solid var(--border);border-radius:6px;padding:1px 7px;font-size:.85em}
/* story */
#story{background:var(--surface-1);border:.5px solid var(--border);border-radius:14px;padding:6px 22px 14px}
#story h2{font-size:1.1rem;font-weight:800;margin:.9em 0 .2em}
#story p{margin:.7em 0}
main:has(.fp:target) #story{display:none}
a.fref{color:inherit;font-family:var(--font-mono);direction:ltr;unicode-bidi:isolate;font-size:.85em;background:var(--bg-accent);border-radius:6px;padding:1px 7px;text-decoration:none;border:.5px solid transparent}
a.fref:hover{border-color:var(--border-strong)}
.hint{color:var(--text-secondary);font-size:.9em;margin-top:1em;border-top:.5px dashed var(--border);padding-top:.8em}
/* learn */
.learn{background:var(--bg-warning);border-radius:12px;padding:10px 16px;margin:14px 0;font-size:.95em}
.learn b{display:block;color:var(--cc);font-size:.88em;margin-bottom:2px}
.learn p{margin:.2em 0}
/* file canvas */
.fp{display:none;background:var(--surface-1);border:.5px solid var(--border);border-radius:14px;padding:16px 26px 20px;scroll-margin-top:14px}
.fp:target{display:block}
.fp .head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding-bottom:10px;border-bottom:.5px solid var(--border)}
.fp .head code{background:transparent;border:none;padding:0;font-size:.95em;color:var(--text-secondary)}
.fp .x{margin-inline-start:auto;color:var(--text-secondary);text-decoration:none;font-size:.85em;background:var(--surface-2);border-radius:20px;padding:2px 13px}
.fp .x:hover{color:var(--text-primary)}
.fp h3.fr{margin:.7em 0 .1em;font-size:1.3rem;font-weight:800}
.w{font-size:.75em;font-weight:700;padding:1px 10px;border-radius:20px}
.w.core{background:var(--bg-accent);color:var(--cb)}
.w.imp{background:var(--surface-2);color:var(--text-primary)}
.w.wire,.w.side{background:var(--surface-2);color:var(--text-secondary)}
.lbl{font-size:.78em;font-weight:700;color:var(--text-secondary);margin-top:1.1em;letter-spacing:.02em}
.rel{display:flex;flex-wrap:wrap;gap:8px;margin:.45em 0 0}
.rel .s{background:var(--surface-2);border:.5px solid var(--border);border-radius:20px;padding:2px 13px;font-size:.86em}
.fp ul{margin:.4em 0 0;padding-right:1.2em}
.fp li{margin:.3em 0}
/* tree */
#tree{width:270px;flex:0 0 270px;background:var(--surface-1);border:.5px solid var(--border);border-radius:14px;padding:12px;position:sticky;top:16px;max-height:calc(100vh - 32px);overflow:auto}
#tree .q{width:100%;background:var(--surface-2);border:.5px solid var(--border);border-radius:8px;padding:5px 10px;font:inherit;font-size:.88em;color:inherit;outline:none;margin-bottom:8px}
#tree .legend{font-size:.76em;color:var(--text-secondary);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;padding-bottom:8px;border-bottom:.5px solid var(--border)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-inline-end:4px;vertical-align:1px}
.dot.core{background:var(--cb)}.dot.imp{background:var(--ca)}.dot.wire{background:var(--border-strong)}.dot.side{background:var(--border)}
.tr{direction:ltr;text-align:left;font-family:var(--font-mono);font-size:.84em;line-height:1.9}
.tr details{padding-left:4px}
.tr details details,.tr details a{margin-left:14px}
.tr summary{cursor:pointer;list-style:none;color:var(--text-secondary);font-weight:600}
.tr summary::before{content:'\25B8';display:inline-block;margin-right:5px;font-size:.8em;transition:transform .12s}
.tr details[open]>summary::before{transform:rotate(90deg)}
.tr a{display:block;color:var(--text-primary);text-decoration:none;border-radius:6px;padding:0 6px}
.tr a::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:1px;background:var(--border)}
.tr a.core::before{background:var(--cb)}.tr a.imp::before{background:var(--ca)}.tr a.wire::before{background:var(--border-strong)}
.tr a.wire,.tr a.side{color:var(--text-secondary)}
.tr a.side{opacity:.75}
.tr a:hover{background:var(--surface-2)}
.tr a.on{background:var(--bg-accent)}
.hidden{display:none!important}
footer{margin-top:46px;color:var(--text-secondary);font-size:.85em;text-align:center}
@media (max-width:760px){.layout{flex-direction:column}#tree{width:100%;flex:none;position:static;max-height:300px;order:-1}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>{{TITLE}}</h1>
  <div class="sub">{{SUBTITLE}}</div>
</header>
<div class="layout">
<main>
{{BODY}}
</main>

<nav id="tree">
  <input class="q" type="search" placeholder="فیلتر فایل‌ها...">
  <div class="legend"><span><i class="dot core"></i>قلب</span><span><i class="dot imp"></i>مهم</span><span><i class="dot wire"></i>سیم‌کشی</span><span><i class="dot side"></i>جانبی</span></div>
  <div class="tr">
{{TREE}}
  </div>
</nav>
</div>
<footer>ساخته‌شده با پلاگین decode · {{DATE}}</footer>
</div>
<script>
(function(){
  var tree=document.querySelector('#tree .tr');
  function sync(){
    var h=location.hash;
    tree.querySelectorAll('a').forEach(function(a){
      var on=a.getAttribute('href')===h;
      a.classList.toggle('on',on);
      if(on){var p=a.parentElement;while(p&&p!==tree){if(p.tagName==='DETAILS')p.open=true;p=p.parentElement}}
    });
    scrollTo({top:0,behavior:'instant'});
  }
  addEventListener('hashchange',sync);sync();
  var q=document.querySelector('#tree .q');
  q.addEventListener('input',function(){
    var t=q.value.trim().toLowerCase();
    tree.querySelectorAll('a').forEach(function(a){
      a.classList.toggle('hidden',t!==''&&a.textContent.toLowerCase().indexOf(t)===-1);
    });
    if(t!=='')tree.querySelectorAll('details').forEach(function(d){d.open=true});
  });
})();
</script>
</body>
</html>
